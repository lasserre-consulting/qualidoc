spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # jwk-set-uri évite l'appel OIDC discovery au démarrage (contrairement à issuer-uri)
          # Les tests d'intégration appellent les use cases directement, jamais via HTTP
          jwk-set-uri: http://localhost:0/.well-known/jwks.json

  mail:
    host: localhost
    port: 3025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  jpa:
    show-sql: false

logging:
  level:
    com.qualidoc: DEBUG
    org.testcontainers: INFO
    tc: INFO
