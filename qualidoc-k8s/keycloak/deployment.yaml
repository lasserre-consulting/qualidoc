apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: qualidoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: theme-setup
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /theme-out/login/resources/css
              cp /theme-in/theme.properties /theme-out/login/theme.properties
              cp /theme-in/login.css /theme-out/login/resources/css/login.css
          volumeMounts:
            - name: keycloak-theme-config
              mountPath: /theme-in
            - name: keycloak-theme-dir
              mountPath: /theme-out

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.7
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args: ["start", "--health-enabled=true", "--hostname=https://keycloak.qualidoc.fr", "--proxy-headers=xforwarded", "--http-enabled=true", "--import-realm"]
          ports:
            - containerPort: 8180
          envFrom:
            - configMapRef:
                name: qualidoc-config
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: qualidoc-secrets
                  key: KC_BOOTSTRAP_ADMIN_USERNAME
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qualidoc-secrets
                  key: KC_BOOTSTRAP_ADMIN_PASSWORD
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: qualidoc-secrets
                  key: DB_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qualidoc-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: keycloak-theme-dir
              mountPath: /opt/keycloak/themes/qualidoc
            - name: keycloak-realm-import
              mountPath: /opt/keycloak/data/import

          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

      volumes:
        - name: keycloak-theme-config
          configMap:
            name: keycloak-theme
        - name: keycloak-theme-dir
          emptyDir: {}
        - name: keycloak-realm-import
          configMap:
            name: keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: qualidoc
spec:
  selector:
    app: keycloak
  ports:
    - port: 8180
      targetPort: 8180
