services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: qualidoc-postgres
    environment:
      POSTGRES_DB: qualidoc
      POSTGRES_USER: qualidoc
      POSTGRES_PASSWORD: qualidoc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualidoc"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (stockage objet compatible S3) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: qualidoc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
    container_name: qualidoc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Keycloak (Identity Provider) ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.7
    container_name: qualidoc-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/qualidoc
      KC_DB_USERNAME: qualidoc
      KC_DB_PASSWORD: qualidoc
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8180/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── MailHog (SMTP de dev, interface web pour voir les emails) ─────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: qualidoc-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Interface web

volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:
