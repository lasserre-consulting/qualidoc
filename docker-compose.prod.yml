services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: qualidoc-postgres
    environment:
      POSTGRES_DB: qualidoc
      POSTGRES_USER: ${DB_USER:-qualidoc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qualidoc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualidoc"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (stockage objet) ─────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: qualidoc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    networks:
      - qualidoc
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
    container_name: qualidoc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - qualidoc
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Keycloak ──────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.7
    container_name: qualidoc-keycloak
    command: start --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?KC_ADMIN_PASSWORD is required}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/qualidoc
      KC_DB_USERNAME: ${DB_USER:-qualidoc}
      KC_DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      KC_HTTP_PORT: 8180
      KC_HTTP_RELATIVE_PATH: /qualidoc/auth
      KC_HOSTNAME: ${KC_HOSTNAME:?KC_HOSTNAME is required}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    ports:
      - "127.0.0.1:8180:8180"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - qualidoc
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend Angular ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./qualidoc-frontend
      dockerfile: Dockerfile
    container_name: qualidoc-frontend
    ports:
      - "127.0.0.1:4203:80"
    networks:
      - qualidoc
    restart: unless-stopped

  # ── Backend Spring Boot ───────────────────────────────────────────────────
  backend:
    build:
      context: ./qualidoc-backend
      dockerfile: Dockerfile
    container_name: qualidoc-backend
    ports:
      - "127.0.0.1:8082:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/qualidoc
      DB_USER: ${DB_USER:-qualidoc}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      KEYCLOAK_JWK_SET_URI: http://keycloak:8180/qualidoc/auth/realms/qualidoc/protocol/openid-connect/certs
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: qualidoc-documents
      ELASTICSEARCH_URI: http://elasticsearch:9200
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_PORT: ${MAIL_PORT:-25}
    networks:
      - qualidoc
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

networks:
  qualidoc:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:
