name: CI — Backend Kotlin

on:
  push:
    branches: [main, develop]
    paths:
      - 'qualidoc-backend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'qualidoc-backend/**'

jobs:
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: qualidoc_test
          POSTGRES_USER: qualidoc
          POSTGRES_PASSWORD: qualidoc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - run: chmod +x qualidoc-backend/gradlew
      - name: Tests
        working-directory: qualidoc-backend
        run: ./gradlew test --no-daemon
        env:
          DB_URL: jdbc:postgresql://localhost:5432/qualidoc_test
          DB_USER: qualidoc
          DB_PASSWORD: qualidoc
          SPRING_PROFILES_ACTIVE: test

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - run: chmod +x qualidoc-backend/gradlew
      - run: cd qualidoc-backend && ./gradlew bootJar --no-daemon
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/qualidoc-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v5
        with:
          context: qualidoc-backend
          file: qualidoc-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
