spring:
  application:
    name: qualidoc-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/qualidoc}
    username: ${DB_USER:qualidoc}
    password: ${DB_PASSWORD:qualidoc}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway gère le schéma, Hibernate valide uniquement
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/qualidoc/protocol/openid-connect/certs}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:qualidoc-documents}

# Elasticsearch
spring.elasticsearch:
  uris: ${ELASTICSEARCH_URI:http://localhost:9200}
  username: ${ELASTICSEARCH_USER:}
  password: ${ELASTICSEARCH_PASSWORD:}

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth2-redirect-url: http://localhost:8080/swagger-ui/oauth2-redirect.html
  info:
    title: QualiDoc API
    description: API REST de gestion documentaire inter-établissements
    version: 1.0.0

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    com.qualidoc: DEBUG
    org.springframework.security: INFO
