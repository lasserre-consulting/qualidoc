name: CI — Frontend Angular

on:
  push:
    branches: [main, develop]
    paths:
      - 'qualidoc-frontend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'qualidoc-frontend/**'

jobs:
  test:
    name: Lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: qualidoc-frontend/package-lock.json
      - run: cd qualidoc-frontend && npm ci
      - run: cd qualidoc-frontend && npm run build:prod

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/qualidoc-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v5
        with:
          context: qualidoc-frontend
          file: qualidoc-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
