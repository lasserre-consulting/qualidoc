apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qualidoc-ingress
  namespace: qualidoc
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.middlewares: qualidoc-redirect-https@kubernetescrd
spec:
  tls:
    - hosts:
        - qualidoc.fr
        - api.qualidoc.fr
      secretName: qualidoc-tls
  rules:
    # Frontend Angular
    - host: qualidoc.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

    # Backend REST API
    - host: api.qualidoc.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080

